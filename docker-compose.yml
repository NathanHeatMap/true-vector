services:
  postgres:
    image: postgres:16-alpine
    container_name: vetting-postgres
    environment:
      POSTGRES_USER: vetting
      POSTGRES_PASSWORD: vetting_dev_password
      POSTGRES_DB: vetting_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetting -d vetting_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
